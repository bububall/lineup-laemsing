<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineup Reveal 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --fire:#FF4500;--fire2:#FF8C00;--fire3:#FFD700;
  --ice:#00C8FF;--ice2:#0090E8;--ice3:#004FA8;
  --dark:#11141B;--surface:#0D1424;
}
body{font-family:'Barlow Condensed',sans-serif;background:var(--dark);color:#fff;min-height:100vh;}

/* ══════════ EDITOR ══════════ */
#editor{max-width:1000px;margin:0 auto;padding:32px 22px 80px;}
.ed-header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
.ed-icon{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,var(--fire),var(--fire2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,69,0,.4);}
.ed-h{font-size:28px;font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--fire2),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ed-sub{text-align:center;font-size:12px;color:#2A4060;font-family:'Rajdhani',sans-serif;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase;}
.meta-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.inp{background:var(--surface);border:1px solid #162040;border-radius:7px;padding:9px 13px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:var(--ice);}
.vid-row{display:flex;gap:6px;align-items:center;background:#080E1C;border:1px solid #162040;border-radius:7px;padding:8px 12px;margin-bottom:18px;}
.vid-row label{font-size:10px;letter-spacing:2px;color:#2A4060;white-space:nowrap;text-transform:uppercase;}
.vid-row .inp{border:none;background:transparent;padding:0;font-size:11px;color:#5A7A9A;}
.tabs{display:flex;border-radius:8px 8px 0 0;overflow:hidden;}
.tab{flex:1;padding:11px;background:#080E1C;border:none;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.on{background:var(--surface);color:#fff;}
.tab.on.fire-tab{border-bottom-color:var(--fire);}
.tab.on.ice-tab{border-bottom-color:var(--ice);}
.tblock{background:var(--surface);border:1px solid #162040;border-top:none;border-radius:0 0 10px 10px;padding:16px;margin-bottom:16px;}
.tname-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.inp.big{font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.cw-row{display:flex;gap:6px;align-items:center;background:#080E1C;border:1px solid #162040;border-radius:7px;padding:8px 12px;margin-bottom:12px;}
.cw-row label{font-size:10px;letter-spacing:2px;color:#2A4060;white-space:nowrap;text-transform:uppercase;}
.cw-row .inp{border:none;background:transparent;padding:0;font-size:11px;color:#5A7A9A;}
.cprev{width:48px;height:56px;border-radius:6px;overflow:hidden;border:1px solid #162040;background:#080E1C;flex-shrink:0;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;}
.cprev img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.cprev .upico{font-size:18px;opacity:.3;pointer-events:none;}
.cprev:hover{border-color:var(--ice);opacity:.8;}
.col-pick{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.col-pick label{font-size:10px;letter-spacing:2px;color:#2A4060;text-transform:uppercase;}
.col-pick input[type=color]{width:32px;height:32px;border:2px solid #162040;border-radius:6px;cursor:pointer;background:none;padding:2px;}
/* player row */
.ph-row{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:6px;padding-bottom:5px;}
.ph{font-size:10px;letter-spacing:2px;color:#2A4060;text-transform:uppercase;}
.prow{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:6px;margin-bottom:6px;align-items:center;}
.prow .inp{font-size:13px;}
/* upload thumb button */
.upbtn{height:36px;background:#080E1C;border:1px dashed #162040;border-radius:6px;color:#2A4060;font-size:10px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;position:relative;overflow:hidden;padding:0 6px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
.upbtn:hover{border-color:var(--ice);color:var(--ice);}
.upbtn.has-img{border-style:solid;border-color:#162040;}
.upbtn img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:5px;opacity:.7;}
.upbtn span{position:relative;z-index:1;font-size:9px;}
.del-btn{width:36px;height:36px;background:rgba(255,40,40,.08);border:1px solid rgba(255,40,40,.2);border-radius:6px;color:rgba(255,80,80,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-family:monospace;}
.del-btn:hover{background:rgba(255,40,40,.2);color:#ff6060;border-color:rgba(255,80,80,.5);}
.add-p{width:100%;padding:7px;background:transparent;border:1px dashed #162040;border-radius:5px;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;margin-top:2px;transition:all .2s;}
.add-p:hover{border-color:var(--ice);color:var(--ice);}
.go-btn{display:block;width:100%;padding:15px;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;letter-spacing:6px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;color:#fff;background:linear-gradient(90deg,var(--fire) 0%,var(--fire2) 35%,var(--ice2) 65%,var(--ice) 100%);box-shadow:0 0 32px rgba(255,100,0,.25),0 0 32px rgba(0,144,232,.2),0 6px 24px rgba(0,0,0,.5);transition:transform .15s;}
.go-btn::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .6s;}
.go-btn:hover::before{left:145%;}
.go-btn:hover{transform:translateY(-2px);}

/* ══════════ DISPLAY ══════════ */
#display{display:none;position:fixed;inset:0;background:var(--dark);z-index:999;flex-direction:column;overflow:hidden;}

/* VIDEO/IMAGE BG */
#videoBg{position:absolute;inset:0;z-index:0;overflow:hidden;display:none;}
#videoBg video{width:100%;height:100%;object-fit:cover;opacity:.35;}
#bgImg{opacity:.35;}
#videoBg::after{content:'';position:absolute;inset:0;background:rgba(3,5,8,.5);}

/* BG layers */
.d-bg{position:absolute;inset:0;pointer-events:none;z-index:1;}
.d-bg-base{position:absolute;inset:0;background:var(--dark);}
.d-bg-fire{position:absolute;inset:0;background:radial-gradient(ellipse 70% 90% at 12% 72%,rgba(255,80,20,.30) 0%,rgba(255,80,20,.10) 42%,transparent 75%),linear-gradient(125deg,rgba(255,60,20,.12) 0%,transparent 42%);mix-blend-mode:screen;transition:opacity 1s;}
.d-bg-ice{position:absolute;inset:0;background:radial-gradient(ellipse 70% 90% at 90% 30%,rgba(0,170,255,.26) 0%,rgba(0,170,255,.08) 42%,transparent 75%),linear-gradient(-125deg,rgba(0,140,255,.12) 0%,transparent 42%);mix-blend-mode:screen;transition:opacity 1s;}
.d-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:52px 52px;}
.d-bg-speed{position:absolute;inset:0;background-image:repeating-linear-gradient(-54deg,transparent 0,transparent 44px,rgba(255,255,255,.022) 44px,rgba(255,255,255,.022) 45px);}

/* particles only */
#particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:2;}

/* ── HEADER ── */
.d-top{position:relative;z-index:10;height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 52px;border-bottom:1px solid rgba(255,255,255,.04);}
.d-top-side{min-width:180px;}
.d-top-side.right{text-align:right;}
.side-tag{font-size:9px;letter-spacing:5px;text-transform:uppercase;margin-bottom:3px;}
.side-info{font-size:12px;color:#2A4060;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}

/* ── TEAM NAME BAR ── */
.d-team-bar{position:relative;z-index:10;flex-shrink:0;height:40px;display:flex;align-items:center;justify-content:center;gap:14px;}
.d-tbar-line{height:1px;width:80px;opacity:.6;}
.d-tbar-name{font-size:20px;font-weight:900;letter-spacing:8px;text-transform:uppercase;}

/* ══════════ CARDS ══════════ */
.d-cards{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;gap:14px;padding:22px 22px 40px;}

.ccard-w{
  perspective:1200px;flex:1;max-width:232px;aspect-ratio:200/292;
  opacity:0;transform:translateY(60px) scale(.8);
  transition:opacity .55s ease,transform .65s cubic-bezier(.18,.68,0,1.2);
  will-change:transform,opacity;
}
.ccard-w.show{opacity:1;transform:translateY(0) scale(1);animation:cardFloat 4s ease-in-out infinite;}
.ccard-w.show:nth-child(1){animation-delay:0s;}
.ccard-w.show:nth-child(2){animation-delay:.5s;}
.ccard-w.show:nth-child(3){animation-delay:1s;}
.ccard-w.show:nth-child(4){animation-delay:1.5s;}
.ccard-w.show:nth-child(5){animation-delay:2s;}
@keyframes cardFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-9px) scale(1.008);}
}

.ccard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.36,0,.16,1);filter:drop-shadow(0 20px 40px rgba(0,0,0,.85));will-change:transform;}
.ccard.flipped{transform:rotateY(180deg);}
.cface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;overflow:hidden;}

/* ── FRONT — player photo + icon top-left + name bottom-left ── */
.cfront{display:flex;flex-direction:column;}

/* photo fills card */
.cf-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;border-radius:14px;}
.cf-nophoto{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0f1e,#0d1828);}

/* dark gradient bottom so name pops */
.cf-grad{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.7) 30%,rgba(0,0,0,.2) 70%,transparent 100%);pointer-events:none;z-index:2;}

/* glow border */
.cf-glow-fire{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 36px rgba(255,100,0,.18),inset 0 1px 0 rgba(255,180,50,.3);pointer-events:none;z-index:3;animation:fgp 3s ease-in-out infinite;}
.cf-glow-ice{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 36px rgba(0,180,255,.15),inset 0 1px 0 rgba(100,220,255,.25);pointer-events:none;z-index:3;animation:igp 3s ease-in-out infinite;}
.cf-gloss{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 40%);pointer-events:none;z-index:3;}
@keyframes fgp{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes igp{0%,100%{opacity:.7;}50%{opacity:1;}}

/* position icon — top left */
.cf-icon-box{position:absolute;top:10px;left:10px;z-index:4;width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.cf-icon-box svg{width:22px;height:22px;}

/* name + team bar — bottom left */
.cf-nameblock{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:0 0 0 0;}
.cf-namebar{display:flex;align-items:center;gap:0;}
.cf-bar-accent{width:6px;height:100%;min-height:42px;flex-shrink:0;}
.cf-name-inner{padding:8px 10px 8px 10px;flex:1;}
.cf-ign{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;line-height:1;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,1);}

/* ── FRONT (team name, shown first) ── */
.cfront{transform:rotateY(0deg);}

/* ── BACK (player photo, shown after flip) ── */
.cback{transform:rotateY(180deg);}
.cb-inner{width:100%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#060a14,#0d1828);}
.cb-back-glow{position:absolute;inset:0;border-radius:14px;pointer-events:none;}
.cb-back-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:28px 28px;border-radius:14px;}
.cb-topbar{position:absolute;top:0;left:0;right:0;height:4px;}
.cb-sl{position:absolute;left:0;top:0;bottom:0;width:3px;}
.cb-sr{position:absolute;right:0;top:0;bottom:0;width:3px;}
.cb-teamname{position:relative;z-index:2;font-size:30px;font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;text-align:center;line-height:1.1;text-shadow:0 0 40px currentColor,0 2px 10px rgba(0,0,0,1);padding:0 12px;}
.cb-teamline{position:relative;z-index:2;height:2px;width:80px;border-radius:2px;margin-top:10px;opacity:.8;}

/* ── SWITCH ── */
.d-sw{position:fixed;inset:0;z-index:600;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:0;pointer-events:none;transition:opacity .4s;}
.d-sw.on{opacity:1;pointer-events:all;}
.sw-label{font-size:11px;letter-spacing:6px;color:#2A4060;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.sw-name{font-size:54px;font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;filter:drop-shadow(0 0 28px currentColor);}
.sw-line{width:0;height:2px;border-radius:2px;margin-top:4px;transition:width 1.4s ease;}
.d-sw.on .sw-line{width:220px;}

/* ── CONTROLS ── */
.ctrl{position:fixed;top:16px;right:16px;z-index:1002;display:flex;gap:8px;}
.cbtn{background:rgba(3,5,12,.9);border:1px solid #0D1830;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:7px 14px;border-radius:5px;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);text-transform:uppercase;}
.cbtn:hover{color:#fff;border-color:#fff;}
</style>
</head>
<body>

<!-- ══════════ EDITOR ══════════ -->
<div id="editor">
  <div class="ed-header">
    <div class="ed-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C9 6 6 8 6 12a6 6 0 0012 0c0-4-3-6-6-10zm0 16a4 4 0 01-4-4c0-2.5 1.5-4 4-7 2.5 3 4 4.5 4 7a4 4 0 01-4 4z"/><circle cx="12" cy="16" r="1.5" fill="rgba(255,255,255,.5)"/></svg>
    </div>
    <div class="ed-h">LINEUP REVEAL 3D</div>
  </div>
  <div class="ed-sub">กรอกข้อมูล → Show → 10 วิ flip → ทีม B อัตโนมัติ</div>

  <div class="meta-g">
    <input class="inp" id="eLabel" value="APL 2026" placeholder="ชื่อรายการ" oninput="saveState()">
    <input class="inp" id="eEvent" value="Arena of Valor Premier League" placeholder="Event name" oninput="saveState()">
    <input class="inp" id="eDate" placeholder="วันที่ / สนาม" oninput="saveState()">
  </div>
  <div class="vid-row" style="align-items:center;gap:10px;">
    <label style="white-space:nowrap;">🖼 พื้นหลัง:</label>
    <div class="cprev" onclick="document.getElementById('eBgFile').click()" title="อัพโหลดรูป/วิดีโอพื้นหลัง" style="width:56px;height:40px;">
      <img id="piBg"><span class="upico" style="font-size:14px;">＋</span>
    </div>
    <input type="file" id="eBgFile" accept="image/*,video/*" style="display:none" onchange="handleBgUpload(this)">
    <span style="font-size:10px;color:#2A4060;letter-spacing:1px;" id="bgName">คลิกเพื่ออัพโหลดรูป/วิดีโอ</span>
    <button style="margin-left:auto;background:transparent;border:none;color:#2A4060;cursor:pointer;font-size:10px;letter-spacing:1px;" onclick="clearBg()">✕ ล้าง</button>
    <input id="eBgVid" type="hidden" value="">
  </div>

  <div class="tabs">
    <button class="tab on fire-tab" id="tabA" onclick="switchTab('A',this)">TEAM A</button>
    <button class="tab ice-tab" id="tabB" onclick="switchTab('B',this)">TEAM B</button>
  </div>

  <!-- TEAM A -->
  <div class="tblock" id="blkA">
    <div class="tname-row">
      <input class="inp big" id="nameA" value="BRU ESPORTS" placeholder="ชื่อทีม A" maxlength="24" oninput="saveState()">
      <div class="col-pick"><label>สี</label><input type="color" id="colA" value="#FF4500" oninput="saveState()"></div>
    </div>
    <div class="cw-row">
      <label>🖼 ปกการ์ด:</label>
      <div class="cprev" onclick="triggerUpload('covA','piA')" title="คลิกเพื่ออัพโหลดรูปปก">
        <img id="piA"><span class="upico">＋</span>
      </div>
      <input type="file" id="covA" accept="image/*" style="display:none" onchange="handleCoverUpload(this,'A','piA')">
      <span style="font-size:10px;color:#2A4060;letter-spacing:1px;" id="covA_name">คลิกที่รูปเพื่ออัพโหลด</span>
      <button style="margin-left:auto;background:transparent;border:none;color:#2A4060;cursor:pointer;font-size:10px;letter-spacing:1px;" onclick="clearCover('A','piA')" title="ล้างรูป">✕ ล้าง</button>
    </div>
    <div class="ph-row" style="grid-template-columns:1fr 80px 80px 36px;"><div class="ph">IGN</div><div class="ph">รูปผู้เล่น</div><div class="ph">ไอคอน</div><div class="ph"></div></div>
    <div id="lstA"></div>
    <button class="add-p" onclick="addRow('A')">+ เพิ่มผู้เล่น</button>
  </div>

  <!-- TEAM B -->
  <div class="tblock" id="blkB" style="display:none">
    <div class="tname-row">
      <input class="inp big" id="nameB" value="INFINITY" placeholder="ชื่อทีม B" maxlength="24" oninput="saveState()">
      <div class="col-pick"><label>สี</label><input type="color" id="colB" value="#00C8FF" oninput="saveState()"></div>
    </div>
    <div class="cw-row">
      <label>🖼 ปกการ์ด:</label>
      <div class="cprev" onclick="triggerUpload('covB','piB')" title="คลิกเพื่ออัพโหลดรูปปก">
        <img id="piB"><span class="upico">＋</span>
      </div>
      <input type="file" id="covB" accept="image/*" style="display:none" onchange="handleCoverUpload(this,'B','piB')">
      <span style="font-size:10px;color:#2A4060;letter-spacing:1px;" id="covB_name">คลิกที่รูปเพื่ออัพโหลด</span>
      <button style="margin-left:auto;background:transparent;border:none;color:#2A4060;cursor:pointer;font-size:10px;letter-spacing:1px;" onclick="clearCover('B','piB')" title="ล้างรูป">✕ ล้าง</button>
    </div>
    <div class="ph-row" style="grid-template-columns:1fr 80px 80px 36px;"><div class="ph">IGN</div><div class="ph">รูปผู้เล่น</div><div class="ph">ไอคอน</div><div class="ph"></div></div>
    <div id="lstB"></div>
    <button class="add-p" onclick="addRow('B')">+ เพิ่มผู้เล่น</button>
  </div>

  <button class="go-btn" onclick="showDisplay()">▶ SHOW LINEUP</button>
</div>

<!-- ══════════ DISPLAY ══════════ -->
<div id="display">
  <div id="videoBg">
    <video id="bgVideo" autoplay muted loop playsinline></video>
    <div id="bgImg" style="position:absolute;inset:0;background-size:cover;background-position:center;display:none;"></div>
  </div>
  <canvas id="particleCanvas"></canvas>
  <div class="d-bg">
    <div class="d-bg-base" id="bgBase"></div>
    <div class="d-bg-fire" id="bgFire"></div>
    <div class="d-bg-ice" id="bgIce"></div>
    <div class="d-bg-grid"></div>
    <div class="d-bg-speed"></div>
  </div>

  <!-- hidden state holders — not shown on display -->
  <div style="display:none">
    <div id="dtag"></div><div id="devent"></div>
    <div id="dmatch"></div><div id="ddate"></div>
    <div id="tbl"></div><div id="dtname"></div><div id="tbr"></div>
  </div>

  <div class="d-cards" id="dcards"></div>

  <div class="d-sw" id="dsw">
    <div class="sw-label">NEXT TEAM</div>
    <div class="sw-name" id="swname"></div>
    <div class="sw-line" id="swline"></div>
  </div>

  <!-- controls -->
  <div class="ctrl">
    <button class="cbtn" onclick="doNext()">N · NEXT</button>
    <button class="cbtn" onclick="replayTeam()">R · REPLAY</button>
    <button class="cbtn" onclick="toggleFS()">F11 · FULLSCREEN</button>
    <button class="cbtn" onclick="closeDisplay()">E · EDIT</button>
  </div>
</div>

<script>
const DEF={
  A:[{name:'LITTLEBOYZ',url:''},{name:'ALMONDP',url:''},{name:'NUNU',url:''},{name:'LICKY',url:''},{name:'DEAWWY',url:''}],
  B:[{name:'LEDUO',url:''},{name:'YANYAN',url:''},{name:'NEIL',url:''},{name:'KAI',url:''},{name:'BAINI',url:''}]
};
let curTeam='A',flipped=false,autoT=null;

function scheduleAuto(ms,fn){clearAuto();autoT=setTimeout(fn,ms);}
function clearAuto(){if(autoT)clearTimeout(autoT);autoT=null;}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('blkA').style.display=t==='A'?'block':'none';
  document.getElementById('blkB').style.display=t==='B'?'block':'none';
}
function prevCov(t){const u=document.getElementById('cov'+t).value.trim();const i=document.getElementById('pi'+t);i.src=u;i.style.display=u?'block':'none';}

/* ── Background upload ── */
async function handleBgUpload(input){
  const file=input.files[0];if(!file)return;
  const isVideo=file.type.startsWith('video/');
  if(isVideo){
    /* video: use object URL (too large for base64/localStorage) */
    const url=URL.createObjectURL(file);
    imgStore['bg']={type:'video',url};
  } else {
    const b64=await fileToB64(file);
    imgStore['bg']={type:'image',url:b64};
    const pi=document.getElementById('piBg');pi.src=b64;pi.style.display='block';
  }
  document.getElementById('bgName').textContent=file.name;
  saveState();
}
function clearBg(){
  delete imgStore['bg'];
  const pi=document.getElementById('piBg');pi.src='';pi.style.display='none';
  document.getElementById('bgName').textContent='คลิกเพื่ออัพโหลดรูป/วิดีโอ';
  document.getElementById('eBgFile').value='';
  saveState();
}

/* ══════════ IMAGE STORE (base64 in memory + localStorage) ══════════ */
const imgStore={};  // key → base64 dataURL

function b64key(team,idx,type){ return `img_${team}_${idx}_${type}`; }

function fileToB64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(file);
  });
}

/* ── Cover upload ── */
function triggerUpload(inputId,_previewId){
  document.getElementById(inputId).click();
}
async function handleCoverUpload(input,team,previewId){
  const file=input.files[0];if(!file)return;
  const b64=await fileToB64(file);
  const key=`cov_${team}`;
  imgStore[key]=b64;
  const pi=document.getElementById(previewId);
  pi.src=b64;pi.style.display='block';
  document.getElementById('cov'+team+'_name').textContent=file.name;
  saveState();
}
function clearCover(team,previewId){
  const key=`cov_${team}`;
  delete imgStore[key];
  const pi=document.getElementById(previewId);
  pi.src='';pi.style.display='none';
  document.getElementById('cov'+team+'_name').textContent='คลิกที่รูปเพื่ออัพโหลด';
  document.getElementById('cov'+team).value='';
  saveState();
}

/* ── Player row ── */
function mkRow(team,p){
  const idx=Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const d=document.createElement('div');d.className='prow';d.dataset.idx=idx;
  d.style.gridTemplateColumns='1fr 80px 80px 36px';
  d.innerHTML=`
    <input class="inp" value="${(p.name||'').replace(/"/g,'&quot;')}" placeholder="ชื่อ IGN" oninput="saveState()">
    <div class="upbtn${p.url?'  has-img':''}" onclick="triggerPlayerUpload(this,'url')" title="อัพโหลดรูปผู้เล่น">
      ${p.url?`<img src="${p.url}">`:''}
      <span>${p.url?'✓ รูป':'+ รูป'}</span>
      <input type="file" accept="image/*" style="display:none" onchange="handlePlayerUpload(this,'url')">
    </div>
    <div class="upbtn${p.icon?'  has-img':''}" onclick="triggerPlayerUpload(this,'icon')" title="อัพโหลดไอคอน">
      ${p.icon?`<img src="${p.icon}">`:''}
      <span>${p.icon?'✓ ไอคอน':'+ ไอคอน'}</span>
      <input type="file" accept="image/*" style="display:none" onchange="handlePlayerUpload(this,'icon')">
    </div>
    <button class="del-btn" onclick="this.parentElement.remove();saveState();" title="ลบ">✕</button>`;
  document.getElementById('lst'+team).appendChild(d);
}

function triggerPlayerUpload(btn,type){
  btn.querySelector('input[type=file]').click();
}

async function handlePlayerUpload(input,type){
  const file=input.files[0];if(!file)return;
  const b64=await fileToB64(file);
  const btn=input.closest('.upbtn');
  /* store b64 on the button element directly */
  btn.dataset.b64=b64;
  btn.classList.add('has-img');
  /* show thumb */
  let img=btn.querySelector('img');
  if(!img){img=document.createElement('img');btn.insertBefore(img,btn.firstChild);}
  img.src=b64;
  btn.querySelector('span').textContent=type==='url'?'✓ รูป':'✓ ไอคอน';
  saveState();
}
function addRow(t){
  const count=document.querySelectorAll('#lst'+t+' .prow').length;
  if(count>=5){alert('ใส่ได้สูงสุด 5 คนต่อทีม');return;}
  mkRow(t,{name:'',url:'',icon:''});
  saveState();
}
function getPlayers(t){
  return Array.from(document.querySelectorAll('#lst'+t+' .prow')).map(r=>{
    const nameInp=r.querySelector('input.inp');
    const btns=r.querySelectorAll('.upbtn');
    const urlBtn=btns[0],iconBtn=btns[1];
    return{
      name:(nameInp&&nameInp.value.trim())||'',
      url:(urlBtn&&urlBtn.dataset.b64)||'',
      icon:(iconBtn&&iconBtn.dataset.b64)||''
    };
  }).filter(p=>p.name).slice(0,5);
}

/* ══════════ PERSISTENCE ══════════ */
const STORE_KEY='lineup3d_data_v2';
function rawPlayers(t){
  return Array.from(document.querySelectorAll('#lst'+t+' .prow')).map(r=>{
    const nameInp=r.querySelector('input.inp');
    const btns=r.querySelectorAll('.upbtn');
    return{
      name:(nameInp&&nameInp.value)||'',
      url:(btns[0]&&btns[0].dataset.b64)||'',
      icon:(btns[1]&&btns[1].dataset.b64)||''
    };
  });
}
function collectState(){
  const bg=imgStore['bg'];
  return{
    eLabel:document.getElementById('eLabel').value,
    eEvent:document.getElementById('eEvent').value,
    eDate:document.getElementById('eDate').value,
    bg:(bg&&bg.type==='image')?bg.url:'',  /* only save image b64, not video objectURL */
    A:{name:document.getElementById('nameA').value,col:document.getElementById('colA').value,cov:imgStore['cov_A']||'',players:rawPlayers('A')},
    B:{name:document.getElementById('nameB').value,col:document.getElementById('colB').value,cov:imgStore['cov_B']||'',players:rawPlayers('B')}
  };
}
function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(collectState()));}catch(e){
    /* base64 may exceed quota — silently ignore */
  }
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    document.getElementById('eLabel').value=d.eLabel||'APL 2026';
    document.getElementById('eEvent').value=d.eEvent||'';
    document.getElementById('eDate').value=d.eDate||'';
    /* restore bg */
    if(d.bg){
      imgStore['bg']={type:'image',url:d.bg};
      const pi=document.getElementById('piBg');pi.src=d.bg;pi.style.display='block';
      document.getElementById('bgName').textContent='(บันทึกแล้ว)';
    }
    document.getElementById('nameA').value=(d.A&&d.A.name)||'BRU ESPORTS';
    document.getElementById('colA').value=(d.A&&d.A.col)||'#FF4500';
    document.getElementById('nameB').value=(d.B&&d.B.name)||'INFINITY';
    document.getElementById('colB').value=(d.B&&d.B.col)||'#00C8FF';
    /* restore cover images */
    if(d.A&&d.A.cov){
      imgStore['cov_A']=d.A.cov;
      const pi=document.getElementById('piA');pi.src=d.A.cov;pi.style.display='block';
      document.getElementById('covA_name').textContent='(บันทึกแล้ว)';
    }
    if(d.B&&d.B.cov){
      imgStore['cov_B']=d.B.cov;
      const pi=document.getElementById('piB');pi.src=d.B.cov;pi.style.display='block';
      document.getElementById('covB_name').textContent='(บันทึกแล้ว)';
    }
    document.getElementById('lstA').innerHTML='';
    document.getElementById('lstB').innerHTML='';
    ((d.A&&d.A.players)||[]).slice(0,5).forEach(p=>mkRow('A',p));
    ((d.B&&d.B.players)||[]).slice(0,5).forEach(p=>mkRow('B',p));
    return true;
  }catch(e){return false;}
}

/* ══════════ PARTICLES ══════════ */
let particles=[];
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
let animFrame,lastTime=0;

function resizeCanvas(){pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);

function spawnParticles(team){
  particles=[];
  const cols=team==='A'?['#FF6020','#FFD700']:['#00C8FF','#00E5FF'];
  for(let i=0;i<50;i++){
    particles.push({
      x:Math.random()*window.innerWidth,
      y:window.innerHeight+20,
      vx:(Math.random()-.5)*.9,
      vy:-(Math.random()*1.4+.4),
      size:Math.random()*2.2+.6,
      alpha:Math.random()*.7+.2,
      col:cols[i%2],
      life:Math.random()*240+80
    });
  }
}

function animParticles(ts){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  const cols=curTeam==='A'?['#FF6020','#FFD700']:['#00C8FF','#00E5FF'];
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life--; p.alpha-=.0025;
    if(p.life<=0||p.alpha<=0){
      particles[i]={x:Math.random()*pCanvas.width,y:pCanvas.height+8,vx:(Math.random()-.5)*.9,vy:-(Math.random()*1.4+.4),size:Math.random()*2.2+.6,alpha:.65,col:cols[i%2],life:Math.random()*240+80};
      return;
    }
    pCtx.save();
    pCtx.globalAlpha=p.alpha;
    pCtx.shadowBlur=8;pCtx.shadowColor=p.col;
    pCtx.fillStyle=p.col;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill();
    pCtx.restore();
  });
  animFrame=requestAnimationFrame(animParticles);
}

/* ══════════ MAKE CARD ══════════ */
function mkCard(p,col,cover,isFireTeam,teamName){
  const cw=document.createElement('div');cw.className='ccard-w';
  const card=document.createElement('div');card.className='ccard';

  /* ════ FRONT face — cover image + team name (shown FIRST) ════ */
  const front=document.createElement('div');
  front.className='cface cfront';
  front.style.cssText=`border:2px solid ${col}99;box-shadow:0 0 40px ${col}44,0 8px 36px rgba(0,0,0,.9);background:#060a14;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:14px;`;

  /* cover image — fills entire front */
  if(cover){
    const covImg=document.createElement('img');
    covImg.src=cover;
    covImg.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;z-index:0;';
    covImg.onerror=()=>covImg.remove();
    front.appendChild(covImg);
  }

  /* dark scrim so text is readable */
  const scrim=document.createElement('div');
  scrim.style.cssText='position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.65) 100%);z-index:1;';
  front.appendChild(scrim);

  /* grid pattern */
  const fgrid=document.createElement('div');
  fgrid.style.cssText='position:absolute;inset:0;z-index:2;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:28px 28px;border-radius:14px;';
  front.appendChild(fgrid);

  /* top bar accent */
  const ftb=document.createElement('div');
  ftb.style.cssText=`position:absolute;top:0;left:0;right:0;height:4px;z-index:3;background:linear-gradient(90deg,transparent,${col},transparent);`;
  front.appendChild(ftb);

  /* side bars */
  const fsl=document.createElement('div');
  fsl.style.cssText=`position:absolute;left:0;top:0;bottom:0;width:3px;z-index:3;background:linear-gradient(to bottom,${col}00,${col}99,${col}00);`;
  front.appendChild(fsl);
  const fsr=document.createElement('div');
  fsr.style.cssText=`position:absolute;right:0;top:0;bottom:0;width:3px;z-index:3;background:linear-gradient(to bottom,${col}00,${col}99,${col}00);`;
  front.appendChild(fsr);

  /* glow */
  const fglow=document.createElement('div');
  fglow.style.cssText=`position:absolute;inset:0;z-index:2;border-radius:14px;background:radial-gradient(ellipse 80% 60% at 50% 50%,${col}18 0%,transparent 70%);pointer-events:none;`;
  front.appendChild(fglow);

  /* team name block — z-index:4, will fade OUT when flip starts */
  const fnameWrap=document.createElement('div');
  fnameWrap.className='front-name-wrap';
  fnameWrap.style.cssText='position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;gap:10px;transition:opacity .35s ease;';

  const ftn=document.createElement('div');
  ftn.style.cssText=`font-size:clamp(18px,3vw,30px);font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;text-align:center;line-height:1.1;color:${col};text-shadow:0 0 40px ${col},0 2px 10px rgba(0,0,0,1);padding:0 12px;`;
  ftn.textContent=teamName||'TEAM';
  fnameWrap.appendChild(ftn);

  const ftl=document.createElement('div');
  ftl.style.cssText=`height:2px;width:80px;border-radius:2px;background:${col};opacity:.8;`;
  fnameWrap.appendChild(ftl);
  front.appendChild(fnameWrap);

  /* ════ BACK face — player photo + name (shown AFTER flip) ════ */
  const back=document.createElement('div');
  back.className='cface cback';
  back.style.cssText=`border:2px solid ${col}cc;box-shadow:0 0 28px ${col}55,0 8px 32px rgba(0,0,0,.8);background:#060a14;overflow:hidden;border-radius:14px;position:relative;`;

  /* player photo */
  if(p.url){
    const img=document.createElement('img');
    img.className='cf-photo';
    img.alt=p.name;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;border-radius:14px;';
    /* use img.src last, no crossOrigin to avoid CORS block */
    img.onerror=function(){
      this.remove();
      const ph=document.createElement('div');
      ph.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;';
      ph.innerHTML='<svg width="45%" height="45%" viewBox="0 0 100 120" fill="rgba(255,255,255,.06)"><circle cx="50" cy="36" r="22"/><path d="M8 112Q8 76 50 76Q92 76 92 112Z"/></svg>';
      back.insertBefore(ph,back.firstChild);
    };
    img.src=p.url;
    back.appendChild(img);
  } else {
    const ph=document.createElement('div');
    ph.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;';
    ph.innerHTML='<svg width="45%" height="45%" viewBox="0 0 100 120" fill="rgba(255,255,255,.06)"><circle cx="50" cy="36" r="22"/><path d="M8 112Q8 76 50 76Q92 76 92 112Z"/></svg>';
    back.appendChild(ph);
  }

  /* gradient overlay bottom */
  const gr=document.createElement('div');gr.className='cf-grad';back.appendChild(gr);
  back.appendChild(Object.assign(document.createElement('div'),{className:'cf-gloss'}));
  back.appendChild(Object.assign(document.createElement('div'),{className:isFireTeam?'cf-glow-fire':'cf-glow-ice'}));

  /* player name block — starts invisible, fades IN after flip */
  const nb=document.createElement('div');nb.className='cf-nameblock';
  nb.style.cssText='opacity:0;transition:opacity .8s ease;';
  nb.innerHTML=`<div class="cf-namebar"><div class="cf-bar-accent" style="background:${col};"></div><div class="cf-name-inner" style="background:linear-gradient(90deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.6) 70%,transparent 100%);"><div class="cf-ign">${p.name}</div></div></div>`;
  back.appendChild(nb);

  /* icon */
  if(p.icon){
    const ib=document.createElement('div');ib.className='cf-icon-box';
    ib.style.cssText=`background:${col}22;border:1px solid ${col}66;opacity:0;transition:opacity .8s ease;`;
    const iimg=document.createElement('img');
    iimg.src=p.icon;
    iimg.style.cssText='width:26px;height:26px;object-fit:contain;';
    iimg.onerror=()=>ib.remove();
    ib.appendChild(iimg);
    back.appendChild(ib);
  }

  card.appendChild(front);card.appendChild(back);cw.appendChild(card);
  return cw;
}

/* ══════════ DISPLAY LOGIC ══════════ */
function showDisplay(){
  clearAuto();curTeam='A';flipped=false;
  document.getElementById('dtag').textContent=document.getElementById('eLabel').value;
  document.getElementById('dtag').style.color='var(--fire2)';
  document.getElementById('devent').textContent=document.getElementById('eEvent').value;
  document.getElementById('dmatch').textContent=document.getElementById('eLabel').value;
  document.getElementById('dmatch').style.color='var(--fire2)';
  document.getElementById('ddate').textContent=document.getElementById('eDate').value;

  const bgEntry=imgStore['bg'];
  const vid=document.getElementById('bgVideo');
  const bgImg=document.getElementById('bgImg');
  const vidBg=document.getElementById('videoBg');
  vid.style.display='none'; bgImg.style.display='none'; vidBg.style.display='none';
  if(bgEntry){
    vidBg.style.display='block';
    if(bgEntry.type==='image'){
      bgImg.style.backgroundImage=`url('${bgEntry.url}')`;
      bgImg.style.display='block';
      vid.src=''; vid.style.display='none';
    } else {
      vid.style.display='block';
      if(vid.src!==bgEntry.url){vid.src=bgEntry.url;}
      vid.play().catch(()=>{});
    }
  }

  document.getElementById('display').style.cssText='display:flex;flex-direction:column;position:fixed;inset:0;background:var(--dark);z-index:999;overflow:hidden;';
  document.getElementById('editor').style.display='none';
  resizeCanvas();
  renderTeam('A');
}

function renderTeam(team){
  curTeam=team;
  const col=document.getElementById('col'+team).value;
  const name=document.getElementById('name'+team).value;
  const cover=imgStore['cov_'+team]||'';
  const players=getPlayers(team);
  const isFireTeam=team==='A';
  const accentCol=isFireTeam?'var(--fire2)':'var(--ice)';

  document.getElementById('dtag').style.color=accentCol;
  document.getElementById('dmatch').style.color=accentCol;
  const tn=document.getElementById('dtname');tn.textContent=name;tn.style.color=col;
  document.getElementById('tbl').style.background=col;
  document.getElementById('tbr').style.background=col;
  document.getElementById('bgFire').style.opacity=isFireTeam?'1':'0.2';
  document.getElementById('bgIce').style.opacity=isFireTeam?'0.2':'1';

  const area=document.getElementById('dcards');area.innerHTML='';
  players.forEach(p=>area.appendChild(mkCard(p,col,cover,isFireTeam,name)));

  if(animFrame)cancelAnimationFrame(animFrame);
  spawnParticles(team);animParticles();

  const wraps=area.querySelectorAll('.ccard-w');
  wraps.forEach((w,i)=>setTimeout(()=>w.classList.add('show'),150+i*100));

  flipped=false;
  const afterShow=150+players.length*100+450;
  scheduleAuto(afterShow+20000,()=>flipAll(team,players.length));
}

function flipAll(team,count){
  clearAuto();
  /* Step 1 — fade out team name on front face immediately */
  document.querySelectorAll('#dcards .front-name-wrap').forEach(el=>{
    el.style.transition='opacity .35s ease';
    el.style.opacity='0';
  });
  /* Step 2 — flip cards with stagger (after name starts fading) */
  setTimeout(()=>{
    document.querySelectorAll('#dcards .ccard').forEach((c,i)=>setTimeout(()=>{
      c.classList.add('flipped');
    },i*150));
  },180);
  flipped=true;
  /* Step 3 — after all cards flipped, fade in player name + icon */
  const flipDone=180+count*150+950;
  setTimeout(()=>{
    document.querySelectorAll('#dcards .cf-nameblock').forEach(el=>{el.style.opacity='1';});
    document.querySelectorAll('#dcards .cf-icon-box').forEach(el=>{el.style.opacity='1';});
  },flipDone);
  if(team==='A') scheduleAuto(count*150+20000,()=>doSwitch());
}

function doSwitch(){
  clearAuto();
  const col=document.getElementById('colB').value;
  const name=document.getElementById('nameB').value;
  const sw=document.getElementById('dsw');
  const sn=document.getElementById('swname');sn.textContent=name;sn.style.color=col;
  const sl=document.getElementById('swline');sl.style.background=col;sl.style.width='0';
  sw.classList.add('on');
  setTimeout(()=>sl.style.width='220px',50);
  setTimeout(()=>{sw.classList.remove('on');renderTeam('B');},1900);
}

function replayTeam(){
  clearAuto();
  document.querySelectorAll('#dcards .ccard').forEach(c=>c.classList.remove('flipped'));
  document.querySelectorAll('#dcards .front-name-wrap').forEach(el=>{el.style.transition='none';el.style.opacity='1';});
  document.querySelectorAll('#dcards .cf-nameblock').forEach(el=>{el.style.transition='none';el.style.opacity='0';});
  document.querySelectorAll('#dcards .cf-icon-box').forEach(el=>{el.style.transition='none';el.style.opacity='0';});
  flipped=false;
  scheduleAuto(20000,()=>flipAll(curTeam,document.querySelectorAll('#dcards .ccard').length));
}
function closeDisplay(){
  clearAuto();if(animFrame)cancelAnimationFrame(animFrame);
  document.getElementById('display').style.display='none';
  document.getElementById('editor').style.display='block';
}
function toggleFS(){if(!document.fullscreenElement)document.getElementById('display').requestFullscreen();else document.exitFullscreen();}

function doNext(){
  if(curTeam==='A'){
    if(flipped) doSwitch();
    else{ flipAll('A',document.querySelectorAll('#dcards .ccard').length); }
  } else {
    // team B — flip if not flipped
    if(!flipped) flipAll('B',document.querySelectorAll('#dcards .ccard').length);
  }
}

document.addEventListener('keydown',e=>{
  const disp=document.getElementById('display');
  if(!disp||disp.style.display==='none') return;
  const k=e.key.toLowerCase();
  if(k==='r'){e.preventDefault();replayTeam();}
  else if(k==='e'){e.preventDefault();closeDisplay();}
  else if(k==='n'){e.preventDefault();doNext();}
  else if(k==='b'){e.preventDefault();if(curTeam==='B'){clearAuto();renderTeam('A');}}
  else if(e.key==='F11'){e.preventDefault();toggleFS();}
});

if(!loadState()){
  DEF.A.forEach(p=>mkRow('A',p));DEF.B.forEach(p=>mkRow('B',p));
  document.getElementById('eDate').value=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  saveState();
}
</script>
</body>
</html>
