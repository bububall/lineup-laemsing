<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --fire:#FF4500;--fire2:#FF8C00;--fire3:#FFD700;
  --ice:#00C8FF;--ice2:#0090E8;--ice3:#004FA8;
  --dark:#030508;--surface:#0D1424;
}
body{font-family:'Barlow Condensed',sans-serif;background:var(--dark);color:#fff;min-height:100vh;}

/* ══════════ EDITOR ══════════ */
#editor{max-width:1000px;margin:0 auto;padding:32px 22px 80px;}
.ed-header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:6px;}
.ed-icon{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,var(--fire),var(--fire2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,69,0,.4);}
.ed-h{font-size:28px;font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--fire2),var(--ice));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ed-sub{text-align:center;font-size:12px;color:#2A4060;font-family:'Rajdhani',sans-serif;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase;}
.meta-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.inp{background:var(--surface);border:1px solid #162040;border-radius:7px;padding:9px 13px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:var(--ice);}
.vid-row{display:flex;gap:6px;align-items:center;background:#080E1C;border:1px solid #162040;border-radius:7px;padding:8px 12px;margin-bottom:18px;}
.vid-row label{font-size:10px;letter-spacing:2px;color:#2A4060;white-space:nowrap;text-transform:uppercase;}
.vid-row .inp{border:none;background:transparent;padding:0;font-size:11px;color:#5A7A9A;}
.tabs{display:flex;border-radius:8px 8px 0 0;overflow:hidden;}
.tab{flex:1;padding:11px;background:#080E1C;border:none;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.on{background:var(--surface);color:#fff;}
.tab.on.fire-tab{border-bottom-color:var(--fire);}
.tab.on.ice-tab{border-bottom-color:var(--ice);}
.tblock{background:var(--surface);border:1px solid #162040;border-top:none;border-radius:0 0 10px 10px;padding:16px;margin-bottom:16px;}
.tname-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.inp.big{font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.cw-row{display:flex;gap:6px;align-items:center;background:#080E1C;border:1px solid #162040;border-radius:7px;padding:8px 12px;margin-bottom:12px;}
.cw-row label{font-size:10px;letter-spacing:2px;color:#2A4060;white-space:nowrap;text-transform:uppercase;}
.cw-row .inp{border:none;background:transparent;padding:0;font-size:11px;color:#5A7A9A;}
.cprev{width:32px;height:44px;border-radius:4px;overflow:hidden;border:1px solid #162040;background:#080E1C;flex-shrink:0;}
.cprev img{width:100%;height:100%;object-fit:cover;display:none;}
.col-pick{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.col-pick label{font-size:10px;letter-spacing:2px;color:#2A4060;text-transform:uppercase;}
.col-pick input[type=color]{width:32px;height:32px;border:2px solid #162040;border-radius:6px;cursor:pointer;background:none;padding:2px;}
/* player row — ชื่อ + URL รูป + ลบ */
.ph-row{display:grid;grid-template-columns:1fr 1fr 36px;gap:6px;padding-bottom:5px;}
.ph{font-size:10px;letter-spacing:2px;color:#2A4060;text-transform:uppercase;}
.prow{display:grid;grid-template-columns:1fr 1fr 36px;gap:6px;margin-bottom:6px;align-items:center;}
.prow .inp{font-size:13px;}
.del-btn{width:36px;height:36px;background:rgba(255,40,40,.08);border:1px solid rgba(255,40,40,.2);border-radius:6px;color:rgba(255,80,80,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-family:monospace;}
.del-btn:hover{background:rgba(255,40,40,.2);color:#ff6060;border-color:rgba(255,80,80,.5);}
.add-p{width:100%;padding:7px;background:transparent;border:1px dashed #162040;border-radius:5px;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;margin-top:2px;transition:all .2s;}
.add-p:hover{border-color:var(--ice);color:var(--ice);}
.go-btn{display:block;width:100%;padding:15px;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;letter-spacing:6px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;color:#fff;background:linear-gradient(90deg,var(--fire) 0%,var(--fire2) 35%,var(--ice2) 65%,var(--ice) 100%);box-shadow:0 0 32px rgba(255,100,0,.25),0 0 32px rgba(0,144,232,.2),0 6px 24px rgba(0,0,0,.5);transition:transform .15s;}
.go-btn::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .6s;}
.go-btn:hover::before{left:145%;}
.go-btn:hover{transform:translateY(-2px);}

/* ══════════ DISPLAY ══════════ */
#display{display:none;position:fixed;inset:0;background:var(--dark);z-index:999;flex-direction:column;overflow:hidden;}

/* VIDEO BG */
#videoBg{position:absolute;inset:0;z-index:0;overflow:hidden;display:none;}
#videoBg video{width:100%;height:100%;object-fit:cover;opacity:.3;}
#videoBg::after{content:'';position:absolute;inset:0;background:rgba(3,5,8,.55);}

/* BG layers */
.d-bg{position:absolute;inset:0;pointer-events:none;z-index:1;}
.d-bg-base{position:absolute;inset:0;background:var(--dark);}
.d-bg-fire{position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 15% 65%,rgba(255,69,0,.10) 0%,transparent 70%);transition:opacity 1s;}
.d-bg-ice{position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 85% 40%,rgba(0,200,255,.09) 0%,transparent 70%);transition:opacity 1s;}
.d-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px;}
.d-bg-speed{position:absolute;inset:0;background-image:repeating-linear-gradient(-54deg,transparent 0,transparent 44px,rgba(255,255,255,.018) 44px,rgba(255,255,255,.018) 45px);}

/* particles only */
#particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:2;}

/* ── HEADER ── */
.d-top{position:relative;z-index:10;height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 52px;border-bottom:1px solid rgba(255,255,255,.04);}
.d-top-side{min-width:180px;}
.d-top-side.right{text-align:right;}
.side-tag{font-size:9px;letter-spacing:5px;text-transform:uppercase;margin-bottom:3px;}
.side-info{font-size:12px;color:#2A4060;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.d-wm{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;}
.wm-icon{width:54px;height:54px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF5500,#0070D0);box-shadow:0 0 24px rgba(255,100,0,.3),0 0 24px rgba(0,150,255,.2),inset 0 1px 0 rgba(255,255,255,.15);animation:iconPulse 3s ease-in-out infinite;}
@keyframes iconPulse{0%,100%{box-shadow:0 0 20px rgba(255,100,0,.25),0 0 20px rgba(0,150,255,.15);}50%{box-shadow:0 0 38px rgba(255,100,0,.5),0 0 38px rgba(0,150,255,.35);}}
.wm-txt{font-size:72px;font-weight:900;font-style:italic;letter-spacing:3px;text-transform:uppercase;line-height:1;background:linear-gradient(90deg,#FFFFFF,#F0F0FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 3px 0 rgba(0,0,30,.9));}

/* ── TEAM NAME BAR ── */
.d-team-bar{position:relative;z-index:10;flex-shrink:0;height:40px;display:flex;align-items:center;justify-content:center;gap:14px;}
.d-tbar-line{height:1px;width:80px;opacity:.6;}
.d-tbar-name{font-size:20px;font-weight:900;letter-spacing:8px;text-transform:uppercase;}

/* ══════════ CARDS ══════════ */
.d-cards{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;gap:18px;padding:4px 40px 8px;}

.ccard-w{
  perspective:1200px;flex:1;max-width:188px;aspect-ratio:200/292;
  opacity:0;transform:translateY(60px) scale(.8);
  transition:opacity .55s ease,transform .65s cubic-bezier(.18,.68,0,1.2);
  will-change:transform,opacity;
}
.ccard-w.show{opacity:1;transform:translateY(0) scale(1);animation:cardFloat 4s ease-in-out infinite;}
.ccard-w.show:nth-child(1){animation-delay:0s;}
.ccard-w.show:nth-child(2){animation-delay:.5s;}
.ccard-w.show:nth-child(3){animation-delay:1s;}
.ccard-w.show:nth-child(4){animation-delay:1.5s;}
.ccard-w.show:nth-child(5){animation-delay:2s;}
@keyframes cardFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-9px) scale(1.008);}
}

.ccard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.36,0,.16,1);filter:drop-shadow(0 20px 40px rgba(0,0,0,.85));will-change:transform;}
.ccard.flipped{transform:rotateY(180deg);}
.cface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;overflow:hidden;}

/* ── FRONT ── */
.cfront{display:flex;flex-direction:column;}
.cf-cover{position:absolute;inset:0;background-size:cover;background-position:center;}
.cf-overlay-fire{position:absolute;inset:0;background:linear-gradient(165deg,rgba(180,30,0,.78) 0%,rgba(120,20,0,.62) 28%,rgba(10,6,2,.48) 58%,rgba(4,8,22,.70) 100%);}
.cf-overlay-ice{position:absolute;inset:0;background:linear-gradient(165deg,rgba(0,80,160,.78) 0%,rgba(0,50,120,.62) 28%,rgba(2,6,18,.48) 58%,rgba(4,8,22,.70) 100%);}
.cf-gloss{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16) 0%,rgba(255,255,255,.03) 40%,transparent 58%);pointer-events:none;}
.cf-glow-fire{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 36px rgba(255,100,0,.15),inset 0 1px 0 rgba(255,180,50,.25);pointer-events:none;animation:fgp 3s ease-in-out infinite;}
.cf-glow-ice{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 36px rgba(0,180,255,.12),inset 0 1px 0 rgba(100,220,255,.2);pointer-events:none;animation:igp 3s ease-in-out infinite;}
@keyframes fgp{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes igp{0%,100%{opacity:.7;}50%{opacity:1;}}

.cf-content{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px 12px 11px;}
.cf-top{display:flex;flex-direction:column;align-items:center;gap:5px;}
.cf-star{width:28px;height:28px;}
.cf-league{font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);text-align:center;line-height:1.8;}
.cf-mid{text-align:center;}
.cf-vline{font-size:20px;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:.5px;line-height:1.05;text-shadow:0 2px 10px rgba(0,0,0,.95);}
.cf-vline .hy{text-shadow:0 0 14px currentColor,0 2px 10px rgba(0,0,0,.9);}
.cf-bot{font-size:7px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.22);border-top:1px solid rgba(255,255,255,.07);padding-top:7px;width:100%;text-align:center;}

/* ── BACK — photo + name only, NO role/pos text ── */
.cback{transform:rotateY(180deg);}
.cb-inner{width:100%;height:100%;position:relative;display:flex;flex-direction:column;}
.cb-photo{width:100%;flex:1;object-fit:cover;object-position:top center;display:block;}
.cb-nophoto{width:100%;flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#080C18,#0D1828);}
.cb-topbar{position:absolute;top:0;left:0;right:0;height:4px;}
.cb-sl{position:absolute;left:0;top:0;bottom:0;width:3px;}
.cb-sr{position:absolute;right:0;top:0;bottom:0;width:3px;}
.cb-grad{position:absolute;bottom:0;left:0;right:0;height:46%;background:linear-gradient(to top,rgba(0,0,8,1) 0%,rgba(0,0,16,.88) 42%,rgba(0,0,30,.3) 72%,transparent 100%);pointer-events:none;}
.cb-name-wrap{position:absolute;bottom:11px;left:10px;right:10px;z-index:2;}
.cb-name{font-size:21px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1;text-shadow:0 2px 14px rgba(0,0,0,1);}

/* ── BOTTOM BAR ── */
.d-bot{position:relative;z-index:10;height:44px;flex-shrink:0;background:rgba(3,5,12,.96);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;gap:18px;}
.bot-item{font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.2);text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.bot-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.1);}

/* ── (no timer, no next btn) ──*/

/* ── SWITCH ── */
.d-sw{position:fixed;inset:0;z-index:600;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:0;pointer-events:none;transition:opacity .4s;}
.d-sw.on{opacity:1;pointer-events:all;}
.sw-label{font-size:11px;letter-spacing:6px;color:#2A4060;text-transform:uppercase;font-family:'Rajdhani',sans-serif;}
.sw-name{font-size:54px;font-weight:900;font-style:italic;letter-spacing:4px;text-transform:uppercase;filter:drop-shadow(0 0 28px currentColor);}
.sw-line{width:0;height:2px;border-radius:2px;margin-top:4px;transition:width 1.4s ease;}
.d-sw.on .sw-line{width:220px;}

/* ── CONTROLS ── */
.ctrl{position:fixed;top:16px;right:16px;z-index:1002;display:flex;gap:8px;}
.cbtn{background:rgba(3,5,12,.9);border:1px solid #0D1830;color:#2A4060;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:7px 14px;border-radius:5px;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);text-transform:uppercase;}
.cbtn:hover{color:#fff;border-color:#fff;}
</style>
</head>
<body>

<!-- ══════════ EDITOR ══════════ -->
<div id="editor">
  <div class="ed-header">
    <div class="ed-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C9 6 6 8 6 12a6 6 0 0012 0c0-4-3-6-6-10zm0 16a4 4 0 01-4-4c0-2.5 1.5-4 4-7 2.5 3 4 4.5 4 7a4 4 0 01-4 4z"/><circle cx="12" cy="16" r="1.5" fill="rgba(255,255,255,.5)"/></svg>
    </div>
    <div class="ed-h">LINEUP REVEAL 3D</div>

  <div class="meta-g">
    <input class="inp" id="eLabel" value="APL 2026" placeholder="ชื่อรายการ">
    <input class="inp" id="eEvent" value="Arena of Valor Premier League" placeholder="Event name">
    <input class="inp" id="eDate" placeholder="วันที่ / สนาม">
  </div>
  <div class="vid-row">
    <label>วิดีโอพื้นหลัง (mp4):</label>
    <input class="inp" id="eBgVid" placeholder="https://...video.mp4 — ว่างเปล่า = ไม่ใช้">
  </div>

  <div class="tabs">
    <button class="tab on fire-tab" id="tabA" onclick="switchTab('A',this)">TEAM A</button>
    <button class="tab ice-tab" id="tabB" onclick="switchTab('B',this)">TEAM B</button>
  </div>

  <!-- TEAM A -->
  <div class="tblock" id="blkA">
    <div class="tname-row">
      <input class="inp big" id="nameA" value="BRU ESPORTS" placeholder="ชื่อทีม A" maxlength="24">
      <div class="col-pick"><label>สี</label><input type="color" id="colA" value="#FF4500"></div>
    </div>
    <div class="cw-row">
      <label>URL ปกการ์ด:</label>
      <input class="inp" id="covA" placeholder="https://...รูปพื้นหลังปกการ์ด..." oninput="prevCov('A')">
      <div class="cprev"><img id="piA"></div>
    </div>
    <div class="ph-row"><div class="ph">IGN</div><div class="ph">URL รูปผู้เล่น</div><div class="ph"></div></div>
    <div id="lstA"></div>
    <button class="add-p" onclick="addRow('A')">+ เพิ่มผู้เล่น</button>
  </div>

  <!-- TEAM B -->
  <div class="tblock" id="blkB" style="display:none">
    <div class="tname-row">
      <input class="inp big" id="nameB" value="INFINITY" placeholder="ชื่อทีม B" maxlength="24">
      <div class="col-pick"><label>สี</label><input type="color" id="colB" value="#00C8FF"></div>
    </div>
    <div class="cw-row">
      <label>URL ปกการ์ด:</label>
      <input class="inp" id="covB" placeholder="https://...รูปพื้นหลังปกการ์ด..." oninput="prevCov('B')">
      <div class="cprev"><img id="piB"></div>
    </div>
    <div class="ph-row"><div class="ph">IGN</div><div class="ph">URL รูปผู้เล่น</div><div class="ph"></div></div>
    <div id="lstB"></div>
    <button class="add-p" onclick="addRow('B')">+ เพิ่มผู้เล่น</button>
  </div>

  <button class="go-btn" onclick="showDisplay()">▶ SHOW LINEUP</button>
</div>

<!-- ══════════ DISPLAY ══════════ -->
<div id="display">
  <div id="videoBg"><video id="bgVideo" autoplay muted loop playsinline></video></div>
  <canvas id="particleCanvas"></canvas>
  <div class="d-bg">
    <div class="d-bg-base" id="bgBase"></div>
    <div class="d-bg-fire" id="bgFire"></div>
    <div class="d-bg-ice" id="bgIce"></div>
    <div class="d-bg-grid"></div>
    <div class="d-bg-speed"></div>
  </div>

  <div class="d-top">
    <div class="d-top-side">
      <div class="side-tag" id="dtag"></div>
      <div class="side-info" id="devent"></div>
    </div>
    <div class="d-wm">
      <div class="wm-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="white"><polygon points="18,2 8,15 14,15 10,26 20,13 14,13"/></svg>
      </div>
      <div class="wm-txt">LINEUP</div>
    </div>
    <div class="d-top-side right">
      <div class="side-tag" id="dmatch"></div>
      <div class="side-info" id="ddate"></div>
    </div>
  </div>

  <div class="d-team-bar">
    <div class="d-tbar-line" id="tbl"></div>
    <div class="d-tbar-name" id="dtname"></div>
    <div class="d-tbar-line" id="tbr"></div>
  </div>

  <div class="d-cards" id="dcards"></div>

  <div class="d-bot">
    <div class="bot-item" id="db1"></div>
    <div class="bot-dot"></div>
    <div class="bot-item">ARENA OF VALOR</div>
    <div class="bot-dot"></div>
    <div class="bot-item" id="db2"></div>
  </div>



  <div class="d-sw" id="dsw">
    <div class="sw-label">NEXT TEAM</div>
    <div class="sw-name" id="swname"></div>
    <div class="sw-line" id="swline"></div>
  </div>

  <div class="ctrl">
    <button class="cbtn" onclick="replayTeam()">Replay</button>
    <button class="cbtn" onclick="toggleFS()">Fullscreen</button>
    <button class="cbtn" onclick="closeDisplay()">Edit</button>
  </div>
</div>

<script>
const DEF={
  A:[{name:'LITTLEBOYZ',url:''},{name:'ALMONDP',url:''},{name:'NUNU',url:''},{name:'LICKY',url:''},{name:'DEAWWY',url:''}],
  B:[{name:'LEDUO',url:''},{name:'YANYAN',url:''},{name:'NEIL',url:''},{name:'KAI',url:''},{name:'BAINI',url:''}]
};
let curTeam='A',flipped=false,autoT=null;

function scheduleAuto(ms,fn){clearAuto();autoT=setTimeout(fn,ms);}
function clearAuto(){if(autoT)clearTimeout(autoT);autoT=null;}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.getElementById('blkA').style.display=t==='A'?'block':'none';
  document.getElementById('blkB').style.display=t==='B'?'block':'none';
}
function prevCov(t){const u=document.getElementById('cov'+t).value.trim();const i=document.getElementById('pi'+t);i.src=u;i.style.display=u?'block':'none';}

function mkRow(team,p){
  const d=document.createElement('div');d.className='prow';
  d.innerHTML=`<input class="inp" value="${p.name||''}" placeholder="ชื่อ IGN"><input class="inp" value="${p.url||''}" placeholder="https://...รูปผู้เล่น"><button class="del-btn" onclick="this.parentElement.remove()" title="ลบ">✕</button>`;
  document.getElementById('lst'+team).appendChild(d);
}
function addRow(t){mkRow(t,{name:'',url:''});}
function getPlayers(t){
  return Array.from(document.querySelectorAll('#lst'+t+' .prow')).map(r=>{
    const i=r.querySelectorAll('input');
    return{name:i[0].value.trim(),url:i[1].value.trim()};
  }).filter(p=>p.name);
}

/* ══════════ PARTICLES ══════════ */
let particles=[];
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
let animFrame,lastTime=0;

function resizeCanvas(){pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);

function spawnParticles(team){
  particles=[];
  const cols=team==='A'?['#FF6020','#FFD700']:['#00C8FF','#00E5FF'];
  for(let i=0;i<50;i++){
    particles.push({
      x:Math.random()*window.innerWidth,
      y:window.innerHeight+20,
      vx:(Math.random()-.5)*.9,
      vy:-(Math.random()*1.4+.4),
      size:Math.random()*2.2+.6,
      alpha:Math.random()*.7+.2,
      col:cols[i%2],
      life:Math.random()*240+80
    });
  }
}

function animParticles(ts){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  const cols=curTeam==='A'?['#FF6020','#FFD700']:['#00C8FF','#00E5FF'];
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life--; p.alpha-=.0025;
    if(p.life<=0||p.alpha<=0){
      particles[i]={x:Math.random()*pCanvas.width,y:pCanvas.height+8,vx:(Math.random()-.5)*.9,vy:-(Math.random()*1.4+.4),size:Math.random()*2.2+.6,alpha:.65,col:cols[i%2],life:Math.random()*240+80};
      return;
    }
    pCtx.save();
    pCtx.globalAlpha=p.alpha;
    pCtx.shadowBlur=8;pCtx.shadowColor=p.col;
    pCtx.fillStyle=p.col;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill();
    pCtx.restore();
  });
  animFrame=requestAnimationFrame(animParticles);
}

/* ══════════ MAKE CARD ══════════ */
function nophHTML(){
  return`<div class="cb-nophoto" style="width:100%;flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#080C18,#0D1828)"><svg width="48%" height="48%" viewBox="0 0 100 120" fill="rgba(255,255,255,.07)"><circle cx="50" cy="36" r="22"/><path d="M8 112Q8 76 50 76Q92 76 92 112Z"/></svg></div>`;
}

function mkCard(p,col,cover,isFireTeam){
  const cw=document.createElement('div');cw.className='ccard-w';
  const card=document.createElement('div');card.className='ccard';

  /* FRONT */
  const front=document.createElement('div');front.className='cface cfront';
  front.style.border=`2px solid ${isFireTeam?'rgba(200,64,0,.7)':'rgba(0,120,190,.7)'}`;
  front.style.boxShadow=`0 0 28px ${col}44,0 8px 32px rgba(0,0,0,.75)`;

  const fcov=document.createElement('div');fcov.className='cf-cover';
  if(cover)fcov.style.backgroundImage=`url('${cover}')`;
  front.appendChild(fcov);

  const fov=document.createElement('div');fov.className=isFireTeam?'cf-overlay-fire':'cf-overlay-ice';front.appendChild(fov);
  front.appendChild(Object.assign(document.createElement('div'),{className:'cf-gloss'}));
  front.appendChild(Object.assign(document.createElement('div'),{className:isFireTeam?'cf-glow-fire':'cf-glow-ice'}));

  const hy=isFireTeam?`color:var(--fire3)`:`color:var(--ice)`;
  const fc=document.createElement('div');fc.className='cf-content';
  fc.innerHTML=`
    <div class="cf-top">
      <svg class="cf-star" viewBox="0 0 36 36" fill="white"><path d="M18 2L20.5 15.5L34 18L20.5 20.5L18 34L15.5 20.5L2 18L15.5 15.5Z"/></svg>
      <div class="cf-league">ARENA OF VALOR<br>PREMIER LEAGUE<br>2026</div>
    </div>
    <div class="cf-mid">
      <div class="cf-vline">VALOR <span class="hy" style="${hy}">RISES</span></div>
      <div class="cf-vline">BATTLES <span class="hy" style="${hy}">COLLIDE</span></div>
    </div>
    <div class="cf-bot">A &nbsp; P &nbsp; L &nbsp;&nbsp; 2 0 2 6</div>`;
  front.appendChild(fc);

  /* BACK — photo + name only */
  const back=document.createElement('div');back.className='cface cback';
  back.style.border=`2px solid ${col}bb`;
  back.style.boxShadow=`0 0 36px ${col}55,0 8px 36px rgba(0,0,0,.9)`;

  const bi=document.createElement('div');bi.className='cb-inner';

  if(p.url){
    const img=document.createElement('img');img.className='cb-photo';img.src=p.url;img.alt=p.name;
    img.onerror=()=>{img.style.display='none';bi.insertAdjacentHTML('afterbegin',nophHTML());};
    bi.appendChild(img);
  } else bi.innerHTML=nophHTML();

  const tb=document.createElement('div');tb.className='cb-topbar';tb.style.background=`linear-gradient(90deg,${col},transparent)`;bi.appendChild(tb);
  const grad=document.createElement('div');grad.className='cb-grad';bi.appendChild(grad);
  const sl=document.createElement('div');sl.className='cb-sl';sl.style.background=`linear-gradient(to bottom,${col}00,${col}bb,${col}00)`;bi.appendChild(sl);
  const sr=document.createElement('div');sr.className='cb-sr';sr.style.background=`linear-gradient(to bottom,${col}00,${col}bb,${col}00)`;bi.appendChild(sr);

  // name only — no pos, no role box
  const nw=document.createElement('div');nw.className='cb-name-wrap';
  nw.innerHTML=`<div class="cb-name" style="color:${col};text-shadow:0 2px 14px rgba(0,0,0,1),0 0 30px ${col}88">${p.name}</div>`;
  bi.appendChild(nw);

  back.appendChild(bi);
  card.appendChild(front);card.appendChild(back);cw.appendChild(card);
  return cw;
}

/* ══════════ DISPLAY LOGIC ══════════ */
function showDisplay(){
  clearAuto();curTeam='A';flipped=false;
  document.getElementById('dtag').textContent=document.getElementById('eLabel').value;
  document.getElementById('dtag').style.color='var(--fire2)';
  document.getElementById('devent').textContent=document.getElementById('eEvent').value;
  document.getElementById('dmatch').textContent=document.getElementById('eLabel').value;
  document.getElementById('dmatch').style.color='var(--fire2)';
  document.getElementById('ddate').textContent=document.getElementById('eDate').value;
  document.getElementById('db1').textContent=document.getElementById('eLabel').value;
  document.getElementById('db2').textContent=document.getElementById('eEvent').value.toUpperCase();

  const vidUrl=document.getElementById('eBgVid').value.trim();
  const vid=document.getElementById('bgVideo');
  const vidBg=document.getElementById('videoBg');
  if(vidUrl){vid.src=vidUrl;vid.play();vidBg.style.display='block';}
  else{vidBg.style.display='none';}

  document.getElementById('display').style.cssText='display:flex;flex-direction:column;position:fixed;inset:0;background:var(--dark);z-index:999;overflow:hidden;';
  document.getElementById('editor').style.display='none';
  resizeCanvas();
  renderTeam('A');
}

function renderTeam(team){
  curTeam=team;
  const col=document.getElementById('col'+team).value;
  const name=document.getElementById('name'+team).value;
  const cover=document.getElementById('cov'+team).value.trim();
  const players=getPlayers(team);
  const isFireTeam=team==='A';
  const accentCol=isFireTeam?'var(--fire2)':'var(--ice)';

  document.getElementById('dtag').style.color=accentCol;
  document.getElementById('dmatch').style.color=accentCol;
  const tn=document.getElementById('dtname');tn.textContent=name;tn.style.color=col;
  document.getElementById('tbl').style.background=col;
  document.getElementById('tbr').style.background=col;
  document.getElementById('bgFire').style.opacity=isFireTeam?'1':'0.2';
  document.getElementById('bgIce').style.opacity=isFireTeam?'0.2':'1';

  const area=document.getElementById('dcards');area.innerHTML='';
  players.forEach(p=>area.appendChild(mkCard(p,col,cover,isFireTeam)));

  if(animFrame)cancelAnimationFrame(animFrame);
  spawnParticles(team);animParticles();

  const wraps=area.querySelectorAll('.ccard-w');
  wraps.forEach((w,i)=>setTimeout(()=>w.classList.add('show'),150+i*100));

  flipped=false;
  const afterShow=150+players.length*100+450;
  scheduleAuto(afterShow+20000,()=>flipAll(team,players.length));
}

function flipAll(team,count){
  clearAuto();
  document.querySelectorAll('#dcards .ccard').forEach((c,i)=>setTimeout(()=>{c.classList.add('flipped');c.style.transform='';},i*150));
  flipped=true;
  if(team==='A') scheduleAuto(count*150+20000,()=>doSwitch());
}

function doSwitch(){
  clearTimer();
  const col=document.getElementById('colB').value;
  const name=document.getElementById('nameB').value;
  const sw=document.getElementById('dsw');
  const sn=document.getElementById('swname');sn.textContent=name;sn.style.color=col;
  const sl=document.getElementById('swline');sl.style.background=col;sl.style.width='0';
  sw.classList.add('on');
  setTimeout(()=>sl.style.width='220px',50);
  setTimeout(()=>{sw.classList.remove('on');renderTeam('B');},1900);
}

function replayTeam(){
  clearAuto();
  document.querySelectorAll('#dcards .ccard').forEach(c=>c.classList.remove('flipped'));
  flipped=false;
  scheduleAuto(20000,()=>flipAll(curTeam,document.querySelectorAll('#dcards .ccard').length));
}
function closeDisplay(){
  clearAuto();if(animFrame)cancelAnimationFrame(animFrame);
  document.getElementById('display').style.display='none';
  document.getElementById('editor').style.display='block';
}
function toggleFS(){if(!document.fullscreenElement)document.getElementById('display').requestFullscreen();else document.exitFullscreen();}

DEF.A.forEach(p=>mkRow('A',p));DEF.B.forEach(p=>mkRow('B',p));
document.getElementById('eDate').value=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
